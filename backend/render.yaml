services:
  - type: web
    name: devmentor-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "from database import init_db; import asyncio; asyncio.run(init_db())" && uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: devmentor-db
          property: connectionString
      - key: IS_PRODUCTION
        value: "true"
      - key: RENDER
        value: "true"
      - key: EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: CHAT_MODEL
        value: llama-3.3-70b-versatile
      - key: CHROMA_DIR
        value: /var/data/chroma_data
      - key: RATE_LIMIT_PER_MINUTE
        value: "60"
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
databases:
  - name: devmentor-db
    plan: free
    postgresMajorVersion: "15"
