<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>DevMentor AI</title>
	<style>
		:root {
			--bg-primary: #0d1117;
			--bg-secondary: #161b22;
			--bg-tertiary: #21262d;
			--bg-code: #1c2128;
			--border: #30363d;
			--text-primary: #e6edf3;
			--text-secondary: #8b949e;
			--text-muted: #6e7681;
			--accent: #6366f1;
			--accent-hover: #818cf8;
			--accent-bg: rgba(99, 102, 241, 0.1);
			--user-bg: #1f6feb;
			--success: #3fb950;
			--error: #f85149;
			--warning: #d29922;
		}

		* { box-sizing: border-box; margin: 0; padding: 0; }

		html, body {
			height: 100%;
			overflow: hidden;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
			background: var(--bg-primary);
			color: var(--text-primary);
			font-size: 14px;
			line-height: 1.5;
		}

		.container { display: flex; flex-direction: column; height: 100%; }

		/* Auth Screen */
		.auth-screen {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			height: 100%;
			padding: 24px;
		}

		.auth-logo {
			width: 64px;
			height: 64px;
			background: linear-gradient(135deg, var(--accent), #a855f7);
			border-radius: 16px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 700;
			font-size: 24px;
			color: white;
			margin-bottom: 24px;
		}

		.auth-screen h1 {
			font-size: 20px;
			font-weight: 600;
			margin-bottom: 8px;
		}

		.auth-screen p {
			font-size: 13px;
			color: var(--text-secondary);
			margin-bottom: 24px;
			text-align: center;
		}

		.auth-tabs {
			display: flex;
			gap: 0;
			margin-bottom: 20px;
			width: 100%;
			max-width: 280px;
		}

		.auth-tab {
			flex: 1;
			padding: 8px 16px;
			background: var(--bg-tertiary);
			border: 1px solid var(--border);
			color: var(--text-secondary);
			cursor: pointer;
			font-size: 13px;
			font-family: inherit;
			text-align: center;
		}

		.auth-tab:first-child { border-radius: 6px 0 0 6px; }
		.auth-tab:last-child { border-radius: 0 6px 6px 0; }
		.auth-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

		.auth-form {
			width: 100%;
			max-width: 280px;
			display: flex;
			flex-direction: column;
			gap: 12px;
		}

		.auth-form input {
			background: var(--bg-tertiary);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 10px 12px;
			color: var(--text-primary);
			font-size: 13px;
			font-family: inherit;
			outline: none;
		}

		.auth-form input:focus { border-color: var(--accent); }

		.auth-form button {
			background: var(--accent);
			color: white;
			border: none;
			border-radius: 6px;
			padding: 10px 16px;
			font-size: 13px;
			font-weight: 600;
			cursor: pointer;
			font-family: inherit;
		}

		.auth-form button:hover { background: var(--accent-hover); }
		.auth-form button:disabled { opacity: 0.5; cursor: not-allowed; }

		.auth-error {
			color: var(--error);
			font-size: 12px;
			text-align: center;
			min-height: 16px;
		}

		.hidden { display: none !important; }

		/* Chat Screen */
		.chat-screen { display: flex; flex-direction: column; height: 100%; min-height: 0; }

		.header {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 14px 16px;
			background: var(--bg-secondary);
			border-bottom: 1px solid var(--border);
		}

		.header-left { display: flex; align-items: center; gap: 10px; }

		.logo {
			width: 32px;
			height: 32px;
			background: linear-gradient(135deg, var(--accent), #a855f7);
			border-radius: 8px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: 700;
			font-size: 14px;
			color: white;
		}

		.header-title { font-size: 15px; font-weight: 600; }
		.header-subtitle { font-size: 11px; color: var(--text-muted); }

		.actions {
			display: flex;
			gap: 6px;
			padding: 10px 14px;
			background: var(--bg-secondary);
			border-bottom: 1px solid var(--border);
			flex-wrap: wrap;
		}

		.btn {
			display: flex;
			align-items: center;
			gap: 5px;
			padding: 6px 12px;
			border: 1px solid var(--border);
			border-radius: 6px;
			font-size: 12px;
			cursor: pointer;
			transition: all 0.15s ease;
			font-family: inherit;
		}

		.btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
		.btn-primary:hover { background: var(--accent-hover); }
		.btn-secondary { background: var(--bg-tertiary); color: var(--text-secondary); }
		.btn-secondary:hover { background: var(--border); color: var(--text-primary); }

		.status-bar {
			display: flex;
			align-items: center;
			justify-content: space-between;
			padding: 6px 14px;
			background: var(--bg-primary);
			border-bottom: 1px solid var(--border);
			font-size: 11px;
		}

		.status-left { display: flex; align-items: center; gap: 6px; }

		.status-dot {
			width: 6px;
			height: 6px;
			border-radius: 50%;
			background: var(--text-muted);
		}

		.status-dot.connected { background: var(--success); }
		.status-dot.disconnected { background: var(--error); }

		.status-text { color: var(--text-muted); }

		.chat-container {
			flex: 1;
			overflow-y: auto;
			min-height: 0;
			padding: 16px;
			display: flex;
			flex-direction: column;
			gap: 16px;
		}

		.chat-container::-webkit-scrollbar { width: 6px; }
		.chat-container::-webkit-scrollbar-track { background: transparent; }
		.chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

		.welcome {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			padding: 40px 20px;
			text-align: center;
			gap: 12px;
		}

		.welcome-icon {
			width: 56px;
			height: 56px;
			background: var(--accent-bg);
			border: 1px solid var(--accent);
			border-radius: 16px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 24px;
		}

		.welcome h2 { font-size: 16px; font-weight: 600; }
		.welcome p { font-size: 13px; color: var(--text-secondary); max-width: 300px; }

		.message-group {
			display: flex;
			flex-direction: column;
			gap: 8px;
			animation: fadeIn 0.2s ease;
		}

		@keyframes fadeIn {
			from { opacity: 0; transform: translateY(8px); }
			to { opacity: 1; transform: translateY(0); }
		}

		.message {
			padding: 12px 14px;
			border-radius: 12px;
			font-size: 13px;
			line-height: 1.6;
			white-space: pre-wrap;
			word-break: break-word;
			max-width: 85%;
		}

		.message.user {
			background: var(--user-bg);
			color: white;
			align-self: flex-end;
			border-bottom-right-radius: 4px;
		}

		.message.bot {
			background: var(--bg-secondary);
			color: var(--text-primary);
			align-self: flex-start;
			border: 1px solid var(--border);
			border-bottom-left-radius: 4px;
		}

		.message.error {
			background: rgba(248, 81, 73, 0.1);
			color: var(--error);
			align-self: flex-start;
			border: 1px solid var(--error);
		}

		.message.thinking {
			color: var(--text-muted);
			font-style: italic;
			background: transparent;
			border: none;
		}

		.message-label {
			font-size: 10px;
			text-transform: uppercase;
			letter-spacing: 0.5px;
			margin-bottom: 4px;
			font-weight: 600;
		}

		.message.user .message-label { color: rgba(255,255,255,0.7); }
		.message.bot .message-label { color: var(--text-muted); }

		.message pre {
			background: var(--bg-code);
			border: 1px solid var(--border);
			border-radius: 6px;
			padding: 10px 12px;
			margin: 8px 0;
			overflow-x: auto;
			font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
			font-size: 12px;
			line-height: 1.5;
		}

		.message code {
			font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
			font-size: 12px;
			background: var(--bg-code);
			padding: 2px 5px;
			border-radius: 4px;
		}

		.message pre code { background: transparent; padding: 0; }

		.sources {
			margin-top: 10px;
			padding: 10px 12px;
			background: rgba(56, 139, 253, 0.08);
			border: 1px solid rgba(56, 139, 253, 0.3);
			border-radius: 8px;
			font-size: 11px;
		}

		.sources-header {
			display: flex;
			align-items: center;
			gap: 6px;
			color: #58a6ff;
			font-weight: 600;
			margin-bottom: 6px;
		}

		.source-item { display: flex; align-items: flex-start; gap: 6px; padding: 4px 0; color: var(--text-secondary); }
		.source-item + .source-item { border-top: 1px solid rgba(56, 139, 253, 0.15); }
		.source-file { color: #58a6ff; font-family: 'SF Mono', 'Fira Code', Consolas, monospace; font-size: 11px; flex-shrink: 0; }
		.source-code { color: var(--text-muted); font-family: 'SF Mono', 'Fira Code', Consolas, monospace; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }

		.input-area {
			padding: 12px 14px;
			background: var(--bg-secondary);
			border-top: 1px solid var(--border);
		}

		.input-wrapper {
			display: flex;
			gap: 8px;
			align-items: flex-end;
			background: var(--bg-tertiary);
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 8px 12px;
			transition: border-color 0.15s;
		}

		.input-wrapper:focus-within { border-color: var(--accent); }

		.input-wrapper textarea {
			flex: 1;
			background: transparent;
			border: none;
			color: var(--text-primary);
			font-size: 13px;
			font-family: inherit;
			resize: none;
			outline: none;
			line-height: 1.5;
			max-height: 100px;
		}

		.input-wrapper textarea::placeholder { color: var(--text-muted); }
		.input-wrapper textarea:disabled { opacity: 0.5; }

		.btn-send {
			background: var(--accent);
			color: white;
			border: none;
			border-radius: 6px;
			padding: 6px 14px;
			font-size: 13px;
			cursor: pointer;
			transition: background 0.15s;
			font-family: inherit;
			display: flex;
			align-items: center;
			gap: 5px;
		}

		.btn-send:hover { background: var(--accent-hover); }
		.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }

		.quiz-options {
			display: flex;
			flex-direction: column;
			gap: 8px;
			padding: 12px 14px;
			align-self: flex-start;
			max-width: 85%;
			margin-top: 4px;
		}

		.quiz-option-btn {
			background: var(--bg-secondary);
			border: 1px solid var(--border);
			border-radius: 8px;
			padding: 10px 14px;
			color: var(--text-primary);
			font-size: 13px;
			cursor: pointer;
			transition: all 0.15s ease;
			font-family: inherit;
			text-align: left;
		}

		.quiz-option-btn:hover {
			background: var(--accent-bg);
			border-color: var(--accent);
		}

		.quiz-option-btn.selected {
			background: var(--accent-bg);
			border-color: var(--accent);
			color: var(--accent-hover);
		}

		.quiz-option-btn:disabled {
			cursor: default;
			opacity: 0.6;
		}

		.quiz-option-btn:disabled:hover {
			background: var(--bg-secondary);
			border-color: var(--border);
		}
	</style>
</head>
<body>
	<div class="container">
		<!-- Auth Screen -->
		<div id="auth-screen" class="auth-screen">
			<div class="auth-logo">DM</div>
			<h1>DevMentor AI</h1>
			<p>AI-powered coding assistant with RAG for personalized guidance</p>

			<div class="auth-tabs">
				<button class="auth-tab active" id="tab-login">Login</button>
				<button class="auth-tab" id="tab-register">Register</button>
			</div>

			<form class="auth-form" id="auth-form">
				<input type="text" id="auth-username" placeholder="Username" autocomplete="username">
				<input type="email" id="auth-email" placeholder="Email" autocomplete="email">
				<input type="password" id="auth-password" placeholder="Password" autocomplete="current-password">
				<input type="text" id="auth-groq-key" placeholder="Your Groq API Key (gsk_...)" autocomplete="off">
				<div class="auth-error" id="auth-error"></div>
				<button type="submit" id="auth-submit">Login</button>
			</form>
		</div>

		<!-- Chat Screen -->
		<div id="chat-screen" class="chat-screen hidden">
			<header class="header">
				<div class="header-left">
					<div class="logo">DM</div>
					<div>
						<div class="header-title">DevMentor AI</div>
						<div class="header-subtitle" id="session-info">Not connected</div>
					</div>
				</div>
			</header>

			<div class="actions">
				<button id="btn-analyze" class="btn btn-primary">Analyze</button>
				<button id="btn-status" class="btn btn-secondary">Status</button>
				<button id="btn-history" class="btn btn-secondary">History</button>
				<button id="btn-issues" class="btn btn-secondary">Issues</button>
				<button id="btn-quiz" class="btn btn-secondary">Quiz</button>
				<button id="btn-plan" class="btn btn-secondary">Plan</button>
				<button id="btn-clear" class="btn btn-secondary">Clear</button>
			</div>

			<div class="status-bar">
				<div class="status-left">
					<div class="status-dot" id="status-dot"></div>
					<span class="status-text" id="backend-status">Checking backend...</span>
				</div>
				<span class="status-text" id="chunk-count"></span>
			</div>

			<div class="chat-container" id="chat-container">
				<div class="welcome" id="welcome">
					<div class="welcome-icon">&#128640;</div>
					<h2>Welcome to DevMentor AI</h2>
					<p>Analyze your project first, then ask questions about your code. It remembers your conversation.</p>
				</div>
			</div>

			<div class="input-area">
				<div class="input-wrapper">
					<textarea id="user-input" placeholder="Ask about your code..." rows="1"></textarea>
					<button id="btn-send" class="btn-send">Send</button>
				</div>
			</div>
		</div>
	</div>

	<script>
		const vscode = acquireVsCodeApi();
		const chatContainer = document.getElementById('chat-container');
		const welcome = document.getElementById('welcome');
		const userInput = document.getElementById('user-input');
		const btnSend = document.getElementById('btn-send');
		const backendStatus = document.getElementById('backend-status');
		const statusDot = document.getElementById('status-dot');
		const sessionInfo = document.getElementById('session-info');
		const chunkCount = document.getElementById('chunk-count');
		const authScreen = document.getElementById('auth-screen');
		const chatScreen = document.getElementById('chat-screen');
		const authForm = document.getElementById('auth-form');
		const authError = document.getElementById('auth-error');
		const authSubmit = document.getElementById('auth-submit');
		const tabLogin = document.getElementById('tab-login');
		const tabRegister = document.getElementById('tab-register');

		let isProcessing = false;
		let isLoginMode = true;
		let currentQuizSessionId = null;
		let currentQuestionId = null;
		let currentQuestionIndex = 0;
		let totalQuestions = 0;
		let historyLoaded = false;
		let historyMessageShown = false;

		// Auth tab switching
		tabLogin.addEventListener('click', () => {
			isLoginMode = true;
			tabLogin.classList.add('active');
			tabRegister.classList.remove('active');
			authSubmit.textContent = 'Login';
			authError.textContent = '';
		});

		tabRegister.addEventListener('click', () => {
			isLoginMode = false;
			tabRegister.classList.add('active');
			tabLogin.classList.remove('active');
			authSubmit.textContent = 'Register';
			authError.textContent = '';
		});

		// Auth form submission
		authForm.addEventListener('submit', (e) => {
			e.preventDefault();
			const username = document.getElementById('auth-username').value.trim();
			const email = document.getElementById('auth-email').value.trim();
			const password = document.getElementById('auth-password').value;
			const groqKey = document.getElementById('auth-groq-key').value.trim();

			if (!password) {
				authError.textContent = 'Password is required';
				return;
			}

			if (isLoginMode && !email) {
				authError.textContent = 'Email is required';
				return;
			}

			if (!isLoginMode && (!username || !email)) {
				authError.textContent = 'Username and email are required';
				return;
			}

			if (!isLoginMode && !groqKey.startsWith('gsk_')) {
				authError.textContent = 'Please enter a valid Groq API key (starts with gsk_)';
				return;
			}

			authSubmit.disabled = true;
			authError.textContent = '';

			vscode.postMessage({
				type: isLoginMode ? 'login' : 'register',
				username,
				email,
				password,
				groqKey
			});
		});

		// Auto-resize textarea
		userInput.addEventListener('input', () => {
			userInput.style.height = 'auto';
			userInput.style.height = Math.min(userInput.scrollHeight, 100) + 'px';
		});

		vscode.postMessage({ type: 'checkBackend' });
		vscode.postMessage({ type: 'checkAuth' });

		function showChatScreen() {
			authScreen.classList.add('hidden');
			chatScreen.classList.remove('hidden');
		}

		function showAuthScreen() {
			authScreen.classList.remove('hidden');
			chatScreen.classList.add('hidden');
		}

		function renderMessage(text, type, sources = []) {
			if (welcome && type !== 'system') {
				welcome.classList.add('hidden');
			}

			const group = document.createElement('div');
			group.className = 'message-group';

			const label = type === 'user' ? 'You' : type === 'bot' ? 'DevMentor' : type;

			let html = `<div class="message ${type}">`;
			if (type === 'bot' || type === 'user') {
				html += `<div class="message-label">${label}</div>`;
			}
			html += renderText(text);

			if (sources && sources.length > 0) {
				html += renderSources(sources);
			}
			html += '</div>';

			group.innerHTML = html;
			chatContainer.appendChild(group);
			chatContainer.scrollTop = chatContainer.scrollHeight;
			return group;
		}

		function renderText(text) {
			const codeBlocks = [];
			text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
				const placeholder = `%%CODEBLOCK_${codeBlocks.length}%%`;
				codeBlocks.push({ lang, code: escapeHtml(code.trim()) });
				return placeholder;
			});

			const inlineCodes = [];
			text = text.replace(/`([^`]+)`/g, (match, code) => {
				const placeholder = `%%INLINE_${inlineCodes.length}%%`;
				inlineCodes.push(escapeHtml(code));
				return placeholder;
			});

			text = escapeHtml(text);
			text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
			text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
			text = text.replace(/^- (.+)$/gm, '<li>$1</li>');
			text = text.replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>');
			text = text.replace(/^### (.+)$/gm, '<h4>$1</h4>');
			text = text.replace(/^## (.+)$/gm, '<h3>$1</h3>');
			text = text.replace(/^# (.+)$/gm, '<h2>$1</h2>');
			text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" style="color:#58a6ff">$1</a>');
			text = text.replace(/\n/g, '<br>');

			codeBlocks.forEach((block, i) => {
				text = text.replace(`%%CODEBLOCK_${i}%%`, `<pre><code class="lang-${block.lang}">${block.code}</code></pre>`);
			});

			inlineCodes.forEach((code, i) => {
				text = text.replace(`%%INLINE_${i}%%`, `<code>${code}</code>`);
			});

			return text;
		}

		function renderSources(sources) {
			if (!sources || sources.length === 0) return '';
			let html = '<div class="sources"><div class="sources-header">Sources</div>';
			sources.forEach(s => {
				const file = s.file || s.source || 'unknown';
				const code = s.code || '';
				html += `<div class="source-item"><span class="source-file">${escapeHtml(file)}</span><span class="source-code">${escapeHtml(code.substring(0, 60))}${code.length > 60 ? '...' : ''}</span></div>`;
			});
			html += '</div>';
			return html;
		}

		function escapeHtml(text) {
			const div = document.createElement('div');
			div.textContent = text;
			return div.innerHTML;
		}

		function setLoading(loading) {
			isProcessing = loading;
			btnSend.disabled = loading;
			userInput.disabled = loading;
		}

		function addThinking() {
			const group = document.createElement('div');
			group.className = 'message-group';
			group.id = 'thinking-group';
			group.innerHTML = '<div class="message thinking bot"><div class="message-label">DevMentor</div>Thinking...</div>';
			chatContainer.appendChild(group);
			chatContainer.scrollTop = chatContainer.scrollHeight;
		}

		function removeThinking() {
			const el = document.getElementById('thinking-group');
			if (el) el.remove();
		}

		function clearChat() {
			chatContainer.innerHTML = '';
			chatContainer.appendChild(welcome);
			welcome.classList.remove('hidden');
			historyMessageShown = true;
		}

		async function loadQuizQuestion() {
			if (!currentQuizSessionId) return;
			vscode.postMessage({ type: 'loadQuizQuestion', quizSessionId: currentQuizSessionId });
		}

		function renderQuizQuestion(q) {
			if (welcome && !welcome.classList.contains('hidden')) {
				welcome.classList.add('hidden');
			}
			const group = document.createElement('div');
			group.className = 'message-group';
			group.id = 'quiz-question-group';

			const label = `Question ${q.question_index + 1}/${totalQuestions}`;
			let html = `<div class="message bot"><div class="message-label">${label}</div>`;
			html += renderText(q.question_text);
			if (q.code_context) {
				html += `<pre><code>${escapeHtml(q.code_context)}</code></pre>`;
			}
			html += '</div>';

			if (q.options && q.options.length > 0) {
				html += '<div class="quiz-options" id="quiz-options">';
				q.options.forEach(opt => {
					const letter = opt.charAt(0);
					html += `<button class="quiz-option-btn" data-answer="${letter}" onclick="handleQuizOptionClick(this)">${escapeHtml(opt)}</button>`;
				});
				html += '</div>';
			}

			group.innerHTML = html;
			chatContainer.appendChild(group);
			chatContainer.scrollTop = chatContainer.scrollHeight;
		}

		window.handleQuizOptionClick = function(btn) {
			const answer = btn.dataset.answer;
			const buttons = document.querySelectorAll('.quiz-option-btn');
			buttons.forEach(b => {
				b.disabled = true;
				if (b.dataset.answer === answer) {
					b.classList.add('selected');
				}
			});
			submitQuizAnswer(answer);
		};

		async function submitQuizAnswer(answer) {
			if (!currentQuizSessionId || !currentQuestionId) return;
			vscode.postMessage({ type: 'submitQuizAnswer', quizSessionId: currentQuizSessionId, questionId: currentQuestionId, answer });
		}

		async function loadQuizResults() {
			if (!currentQuizSessionId) return;
			vscode.postMessage({ type: 'loadQuizResults', quizSessionId: currentQuizSessionId });
		}

		// Event listeners
		btnSend.addEventListener('click', () => {
			const text = userInput.value.trim();
			if (!text || isProcessing) return;
			userInput.value = '';
			userInput.style.height = 'auto';

			if (currentQuizSessionId && currentQuestionId) {
				renderMessage(text, 'user');
				setLoading(true);
				submitQuizAnswer(text);
			} else {
				renderMessage(text, 'user');
				setLoading(true);
				addThinking();
				vscode.postMessage({ type: 'ask', text });
			}
		});

		userInput.addEventListener('keydown', (e) => {
			if (e.key === 'Enter' && !e.shiftKey) {
				e.preventDefault();
				btnSend.click();
			}
		});

		document.getElementById('btn-analyze').addEventListener('click', () => {
			renderMessage('Analyzing project...', 'user');
			setLoading(true);
			addThinking();
			vscode.postMessage({ type: 'analyze' });
		});

		document.getElementById('btn-status').addEventListener('click', () => {
			vscode.postMessage({ type: 'checkStatus' });
		});

		document.getElementById('btn-history').addEventListener('click', () => {
			vscode.postMessage({ type: 'getHistory' });
		});

		document.getElementById('btn-clear').addEventListener('click', () => {
			vscode.postMessage({ type: 'clear' });
		});

		document.getElementById('btn-issues').addEventListener('click', () => {
			renderMessage('Scanning for issues...', 'user');
			setLoading(true);
			addThinking();
			vscode.postMessage({ type: 'analyzeIssues' });
		});

		document.getElementById('btn-quiz').addEventListener('click', () => {
			renderMessage('Starting quiz...', 'user');
			setLoading(true);
			addThinking();
			vscode.postMessage({ type: 'startQuiz' });
		});

		document.getElementById('btn-plan').addEventListener('click', () => {
			renderMessage('Generating learning plan...', 'user');
			setLoading(true);
			addThinking();
			vscode.postMessage({ type: 'generatePlan' });
		});

		// Handle messages from extension
		window.addEventListener('message', (event) => {
			const { type, text, history, status, error, sources, sessionId } = event.data;
			removeThinking();
			setLoading(false);

			if (type === 'authSuccess') {
				showChatScreen();
				vscode.postMessage({ type: 'checkBackend' });
				if (!historyLoaded) {
					historyLoaded = true;
					vscode.postMessage({ type: 'getHistory' });
				}
			} else if (type === 'authError') {
				authError.textContent = text || 'Authentication failed';
				authSubmit.disabled = false;
			} else if (type === 'showAuth') {
				showAuthScreen();
			} else if (type === 'response') {
				renderMessage(text, 'bot', sources || []);
			} else if (type === 'history') {
				if (history && history.length > 0) {
					history.forEach(h => {
						const q = h.query || h.user_message || '';
						const a = h.response || h.ai_response || '';
						if (q) renderMessage(q, 'user');
						if (a) renderMessage(a, 'bot');
					});
				} else if (!historyMessageShown) {
					historyMessageShown = true;
					// Don't show "No conversation history" - just show welcome
					if (welcome && !welcome.classList.contains('hidden')) {
						welcome.classList.remove('hidden');
					}
				}
			} else if (type === 'analysis') {
				renderMessage(text, 'bot');
			} else if (type === 'status') {
				if (status) {
					if (status.ingested) {
						renderMessage(`Project ingested with ${status.chunks} chunks.`, 'bot');
						chunkCount.textContent = `${status.chunks} chunks`;
					} else {
						renderMessage('No project ingested yet. Click "Analyze" first.', 'bot');
					}
				}
			} else if (type === 'backendStatus') {
				backendStatus.textContent = status.connected ? 'Backend connected' : 'Backend disconnected';
				statusDot.className = 'status-dot ' + (status.connected ? 'connected' : 'disconnected');
				sessionInfo.textContent = status.connected ? 'Ready' : 'Offline';
			} else if (type === 'sessionInfo') {
				sessionInfo.textContent = sessionId || 'Session active';
			} else if (type === 'error') {
				renderMessage('Error: ' + text, 'error');
				setLoading(false);
			} else if (type === 'info') {
				renderMessage(text, 'bot');
			} else if (type === 'quizStarted') {
				removeThinking();
				if (event.data.quizSessionId) {
					currentQuizSessionId = event.data.quizSessionId;
					renderMessage(`Quiz started! ${event.data.totalQuestions} questions.`, 'bot');
					loadQuizQuestion();
				} else {
					renderMessage('Failed to start quiz. Make sure your project is analyzed first.', 'error');
				}
			} else if (type === 'quizQuestion') {
				setLoading(false);
				if (event.data.completed || event.data.error) {
					loadQuizResults();
					return;
				}
				currentQuestionId = event.data.question_id;
				currentQuestionIndex = event.data.question_index;
				totalQuestions = event.data.total_questions || 5;
				renderQuizQuestion(event.data);
			} else if (type === 'quizAnswer') {
				setLoading(false);
				let msg = event.data.correct ? 'Correct!' : 'Incorrect.';
				msg += `\nAnswer: ${event.data.correct_answer}`;
				if (event.data.explanation) msg += `\n\n${event.data.explanation}`;
				renderMessage(msg, event.data.correct ? 'bot' : 'error');
				if (event.data.next_question_available) {
					setTimeout(loadQuizQuestion, 1500);
				} else {
					setTimeout(loadQuizResults, 1500);
				}
			} else if (type === 'quizResults') {
				setLoading(false);
				const data = event.data;
				const pct = data.score_percentage || 0;
				let msg = `Quiz Complete!\n\nScore: ${data.correct_answers}/${data.total_questions} (${pct}%)\n`;
				msg += pct >= 80 ? 'Excellent!' : pct >= 60 ? 'Good job!' : 'Keep practicing!';
				renderMessage(msg, 'bot');
				currentQuizSessionId = null;
			} else if (type === 'issuesResult') {
				removeThinking();
				setLoading(false);
				if (event.data.totalIssues > 0) {
					let msg = `Found ${event.data.totalIssues} issues:\n`;
					const sev = event.data.issuesBySeverity;
					if (sev.critical) msg += `- ${sev.critical} critical\n`;
					if (sev.high) msg += `- ${sev.high} high\n`;
					if (sev.medium) msg += `- ${sev.medium} medium\n`;
					if (sev.low) msg += `- ${sev.low} low`;
					renderMessage(msg, 'bot');
				} else {
					renderMessage('No issues found! Your code looks good.', 'bot');
				}
			} else if (type === 'learningPlan') {
				removeThinking();
				setLoading(false);
				renderMessage(event.data.plan || 'No learning plan generated.', 'bot', event.data.sources || []);
			}
		});
	</script>
</body>
</html>
